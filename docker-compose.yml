name: jeonse-risk

services:
  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: jeonse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jeonse_risk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jeonse1234}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Neo4j Graph DB
  neo4j:
    image: neo4j:5-community
    container_name: jeonse_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-jeonse1234}
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"   # 브라우저 UI
      - "7687:7687"   # Bolt 프로토콜
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
