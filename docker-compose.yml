services:

  # =============================================
  # PostgreSQL DB 컨테이너
  # =============================================
  db:
    image: postgres:16-alpine
    container_name: jeonse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jeonse_risk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jeonse_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # 파이프라인 컨테이너 (최초 CSV 적재, 한 번만 실행)
  # =============================================
  pipeline:
    build: .
    container_name: jeonse_pipeline
    restart: "no"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jeonse_risk
      DB_USER: postgres
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "rag/scripts/preprocess_load.py"]

  # =============================================
  # 배치 컨테이너 (매주 월요일 오전 6시 자동 실행)
  # =============================================
  batch:
    build: .
    container_name: jeonse_batch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jeonse_risk
      DB_USER: postgres
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./docs:/app/docs
    depends_on:
      db:
        condition: service_healthy
    command: ["cron", "-f"]

volumes:
  postgres_data:
